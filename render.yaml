services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: repoinsight-backend
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User must set their own key in Render dashboard
      - key: LLM_PROVIDER
        value: gemini # Defaults to gemini on Render since Ollama is for local
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: CHROMA_DB_PATH
        value: /var/data/chroma_db
      - key: DATABASE_URL
        value: sqlite:////var/data/repo_insight.db
    # Persistent Disk storage so SQLite & Chroma databases persist across deploys
    disk:
      name: repoinsight-data
      mountPath: /var/data
      sizeGB: 1

  # 2. Frontend Web Service (Next.js SSR)
  - type: web
    name: repoinsight-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: repoinsight-backend
          type: web
          property: host
